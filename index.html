<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek 智能助手</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 弹窗特有的毛玻璃与渐变样式，确保完全适配移动端和小红书精致画风 */
        #login-modal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px); 
            -webkit-backdrop-filter: blur(8px);
            z-index: 10000; /* 确保层级在最上方，高过加载动画 */
            justify-content: center; 
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .modal-card {
            background: #ffffff; 
            width: 88%; 
            max-width: 380px; 
            padding: 32px 24px; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            text-align: center; 
            box-sizing: border-box;
            animation: modalFadeIn 0.3s ease-out;
        }
        @keyframes modalFadeIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-card h3 {
            margin: 0 0 12px 0; 
            color: #1a1a1a; 
            font-size: 22px; 
            font-weight: 600;
        }
        .modal-card p {
            margin: 0 0 24px 0; 
            color: #666666; 
            font-size: 14px; 
            line-height: 1.6;
        }
        .modal-card input {
            width: 100%; 
            padding: 14px 16px; 
            margin-bottom: 20px; 
            border: 1.5px solid #e5e5e5; 
            border-radius: 12px; 
            font-size: 16px; 
            box-sizing: border-box; 
            outline: none; 
            transition: all 0.2s;
            text-align: center;
        }
        .modal-card input:focus {
            border-color: #ff2442;
            box-shadow: 0 0 0 3px rgba(255, 36, 66, 0.1);
        }
        .modal-card button {
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #ff2442, #ff4761); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 500; 
            cursor: pointer; 
            box-shadow: 0 8px 16px rgba(255,36,66,0.2); 
            transition: opacity 0.2s;
        }
        .modal-card button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div id="login-modal">
        <div class="modal-card">
            <h3><i class="fa-solid fa-wand-magic-sparkles" style="color: #ff2442; margin-right: 6px;"></i>解锁专属 AI</h3>
            <p>本工具对粉丝免费开放<br>请输入小红书专属暗号解锁使用</p>
            
            <input type="text" id="access-code-input" placeholder="请在此处输入暗号...">
            
            <button onclick="submitAccessCode()">立即解锁</button>
            
            <p style="margin: 20px 0 0 0; color: #999999; font-size: 12px; line-height: 1.6;">
                还没有暗号？打开小红书关注 <span style="color: #ff2442; font-weight: bold;">[你的小红书昵称]</span><br>
                私信回复 <span style="background: #fff0f2; color: #ff2442; padding: 2px 6px; border-radius: 4px; font-weight: 500;">暗号</span> 即可免费获取
            </p>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>提示词工具箱</h2>
            </div>
            <div class="prompt-list" id="promptList">
                </div>
        </div>

        <div class="main-content">
            <div class="top-bar">
                <button class="toggle-sidebar" id="toggleSidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="current-prompt-title" id="currentPromptTitle">请选择一个提示词模板</div>
            </div>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-message">
                    <i class="fas fa-robotWelcome"></i>
                    <h3>欢迎使用 DeepSeek 智能助手</h3>
                    <p>请在左侧选择一个提示词模板，或者直接在下方输入内容开始对话。</p>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="输入消息，Press Enter to send, Shift+Enter for new line..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn" title="发送消息">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="prompts.js"></script>
    <script src="app.js"></script>

    <script>
        // 页面刚加载时，检查本地是否存有暗号，没有就展现弹窗
        document.addEventListener("DOMContentLoaded", function() {
            const savedCode = localStorage.getItem('access_code');
            const modal = document.getElementById('login-modal');
            if (!savedCode && modal) {
                modal.style.display = 'flex';
            }
        });

        // 点击“立即解锁”时的行为
        function submitAccessCode() {
            const codeInput = document.getElementById('access-code-input');
            const inputCode = codeInput ? codeInput.value.trim() : '';
            
            if (!inputCode) {
                alert('请输入有效暗号哦！');
                return;
            }
            
            // 存入浏览器本地缓存
            localStorage.setItem('access_code', inputCode);
            
            // 关闭隐藏弹窗
            document.getElementById('login-modal').style.display = 'none';
            
            // 顺畅过渡提示
            alert('暗号已成功录入！快去发送消息测试吧 ✨');
        }
    </script>
</body>
</html>
